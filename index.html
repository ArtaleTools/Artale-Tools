<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artale 繁中槍手群抽獎輪盤</title>
    <style>
        :root {
            --primary: #ff4757;
            --accent: #ffffff;
            --bg: #0f0f12;
            --card-bg: #1e1e26;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes readyBeat {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -1px) rotate(-1deg); }
            50% { transform: translate(-3px, 1px) rotate(0deg); }
            75% { transform: translate(2px, 2px) rotate(1deg); }
            100% { transform: translate(-1px, -1px) rotate(0deg); }
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #3e1f25, #0f0f12);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .container {
            perspective: 1000px;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        .card { 
            background: rgba(30, 30, 38, 0.95); 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 2px solid var(--primary);
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .lucky-text { 
            background: linear-gradient(110deg, #ff4757 25%, #ffffff 45%, #ff4757 50%, #ffffff 55%, #ff4757 75%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900; 
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 5px rgba(255, 71, 87, 0.5));
            display: inline-block;
        }

        .subtitle { 
            font-size: 32px; 
            margin: 5px 0 25px 0; 
            letter-spacing: 3px; 
        }

        h2 { 
            color: white; 
            margin: 0; 
            letter-spacing: 1px; 
            font-size: 20px;
            opacity: 0.8;
        }

        /* --- 增減控制組優化 --- */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }

        .input-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #121217;
            border-radius: 12px;
            border: 1px solid #444;
            padding: 2px;
            transition: border-color 0.3s;
        }

        .input-control:focus-within {
            border-color: var(--primary);
        }

        .stepper-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 20px;
            font-weight: bold;
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .stepper-btn:hover {
            background: rgba(255, 71, 87, 0.1);
        }

        .stepper-btn:active {
            transform: scale(0.9);
        }

        input { 
            width: 40px; 
            flex-grow: 1;
            padding: 8px 0; 
            border: none;
            background: transparent; 
            color: #ffffff; 
            font-weight: bold; 
            font-size: 18px; 
            text-align: center; 
            outline: none;
        }

        /* 隱藏原生箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-align: left; }

        /* --- 顯示與按鈕 --- */
        #display { 
            font-size: 60px; 
            color: #ffffff; 
            margin: 25px 0; 
            font-family: 'Courier New', monospace; 
            font-weight: 900;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }

        .ready-text {
            animation: readyBeat 1.5s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .win-text {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .draw-btn { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none; 
            color: white; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 15px; 
            box-shadow: 0 6px 0 #a32d38;
            transition: all 0.2s;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .draw-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #a32d38;
        }

        .draw-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a32d38; }
        .draw-btn:disabled { background: #444; box-shadow: none; opacity: 0.8; cursor: not-allowed; }

        .footer-note {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container">
    <div class="card" id="mainCard">
        <h2>Artale 繁中槍手群</h2>
        <div class="subtitle lucky-text">幸運抽獎輪盤</div>
        
        <div class="input-grid">
            <div class="group">
                <label>範圍(小)</label>
                <div class="input-control">
                    <button class="stepper-btn" onclick="step('min', -1)">-</button>
                    <input type="number" id="min" value="1">
                    <button class="stepper-btn" onclick="step('min', 1)">+</button>
                </div>
            </div>
            <div class="group">
                <label>範圍(大)</label>
                <div class="input-control">
                    <button class="stepper-btn" onclick="step('max', -1)">-</button>
                    <input type="number" id="max" value="50">
                    <button class="stepper-btn" onclick="step('max', 1)">+</button>
                </div>
            </div>
            <div class="group" style="grid-column: span 2; margin-top: 10px;">
                <label>抽取數量</label>
                <div class="input-control">
                    <button class="stepper-btn" onclick="step('qty', -1)">-</button>
                    <input type="number" id="qty" value="1">
                    <button class="stepper-btn" onclick="step('qty', 1)">+</button>
                </div>
            </div>
        </div>
        
        <div id="display"><span class="ready-text">READY</span></div>
        
        <button id="btn" class="draw-btn" onclick="startDraw()">啟動抽獎</button>
        
        <div class="footer-note">製作:OOKouun</div>
    </div>
</div>

<script>
    // 數字增減邏輯
    function step(id, val) {
        const input = document.getElementById(id);
        const newValue = parseInt(input.value) + val;
        if (id === 'qty' && newValue < 1) return;
        if (id === 'min' && newValue < 0) return;
        input.value = newValue;
    }

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let pieces = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function fireConfetti() {
        pieces = [];
        const colors = ['#ff4757', '#ffffff', '#a32d38', '#ff6b81'];
        for (let i = 0; i < 150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                rotation: Math.random() * 360,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: Math.random() * 10 + 5,
                speed: Math.random() * 8 + 5,
                osc: Math.random() * 2
            });
        }
        updateConfetti();
    }

    function updateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach((p, i) => {
            p.y += p.speed;
            p.x += Math.sin(p.y / 30) * p.osc;
            p.rotation += 5;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
        });
        pieces = pieces.filter(p => p.y < canvas.height);
        if (pieces.length > 0) requestAnimationFrame(updateConfetti);
    }

    function playTick(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function startDraw() {
        const vMin = parseInt(document.getElementById('min').value),
              vMax = parseInt(document.getElementById('max').value),
              n = parseInt(document.getElementById('qty').value),
              card = document.getElementById('mainCard'),
              disp = document.getElementById('display'),
              btn = document.getElementById('btn');

        if (isNaN(vMin) || isNaN(vMax) || vMin >= vMax || n <= 0 || n > (vMax - vMin + 1)) return alert("設定錯誤");

        btn.disabled = true;
        btn.innerText = "輪盤轉動中...";
        
        let pool = Array.from({length: vMax - vMin + 1}, (_, i) => i + vMin);
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        const winners = pool.slice(0, n).sort((a,b)=>a-b);

        let count = 0;
        let speed = 50;
        
        function roll() {
            count++;
            disp.innerHTML = `<span style="font-size: 70px; text-shadow: 0 0 15px rgba(255,255,255,0.5);">${Math.floor(Math.random() * (vMax - vMin + 1)) + vMin}</span>`;
            playTick(400 + count * 15, 'square', 0.05); 
            
            if (count > 25) card.style.animation = "shake 0.1s infinite";

            if (count < 50) {
                setTimeout(roll, speed);
                if (count > 35) speed += 20;
            } else {
                card.style.animation = "none";
                disp.innerHTML = `
                    <div class="win-text">恭喜中獎！</div>
                    <div class="win-numbers lucky-text">${winners.join('、')}</div>
                `;
                playTick(150, 'sawtooth', 0.5);
                fireConfetti();
                
                btn.disabled = false;
                btn.innerText = "再次啟動抽獎";
            }
        }
        roll();
    }
</script>

</body>
</html>
