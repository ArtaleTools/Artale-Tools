<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artale 繁中槍手群抽獎輪盤</title>
    <style>
        :root {
            --primary: #ff4757;
            --accent: #ffffff;
            --bg: #0f0f12;
            --card-bg: #1e1e26;
        }

        /* 進場動畫 */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 統一的流光動畫 */
        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes readyBeat {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* 震動特效 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -1px) rotate(-1deg); }
            50% { transform: translate(-3px, 1px) rotate(0deg); }
            75% { transform: translate(2px, 2px) rotate(1deg); }
            100% { transform: translate(-1px, -1px) rotate(0deg); }
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #3e1f25, #0f0f12);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #youtube-player { position: absolute; top: -100px; left: -100px; width: 1px; height: 1px; pointer-events: none; }

        .container {
            perspective: 1000px;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        .card { 
            background: rgba(30, 30, 38, 0.95); 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 2px solid var(--primary);
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* 關鍵：完全同步的文字效果 */
        .lucky-text { 
            background: linear-gradient(110deg, #ff4757 25%, #ffffff 45%, #ff4757 50%, #ffffff 55%, #ff4757 75%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900; 
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 5px rgba(255, 71, 87, 0.5));
            display: inline-block;
        }

        .subtitle { 
            font-size: 32px; 
            margin: 5px 0 25px 0; 
            letter-spacing: 3px; 
        }

        h2 { 
            color: white; 
            margin: 0; 
            letter-spacing: 1px; 
            font-size: 20px;
            opacity: 0.8;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }

        .group { text-align: left; }
        .group.full { grid-column: span 2; }

        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }

        input { 
            width: 100%; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #121217; 
            color: #ffffff; 
            font-weight: bold; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
        }

        #display { 
            font-size: 60px; 
            color: #ffffff; 
            margin: 25px 0; 
            font-family: 'Courier New', monospace; 
            font-weight: 900;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }

        .ready-text {
            animation: readyBeat 1.5s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .win-text {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .win-numbers {
            font-size: 52px;
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none; 
            color: white; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 15px; 
            box-shadow: 0 6px 0 #a32d38;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #a32d38;
        }

        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #a32d38; }
        button:disabled { background: #444; box-shadow: none; transform: none; opacity: 0.7; }

        .footer-note {
            font-size: 12px;
            color: #666;
            letter-spacing: 1px;
            margin-top: 10px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div id="youtube-player"></div>

<div class="container">
    <div class="card" id="mainCard">
        <h2>Artale 繁中槍手群</h2>
        <div class="subtitle lucky-text">幸運抽獎輪盤</div>
        
        <div class="input-grid">
            <div class="group">
                <label>範圍(小)</label>
                <input type="number" id="min" value="1">
            </div>
            <div class="group">
                <label>範圍(大)</label>
                <input type="number" id="max" value="50">
            </div>
            <div class="group full">
                <label>抽取數量</label>
                <input type="number" id="qty" value="1">
            </div>
        </div>
        
        <div id="display"><span class="ready-text">READY</span></div>
        
        <button id="btn" onclick="startDraw()">啟動抽獎</button>
        
        <div class="footer-note">製作:OOKouun</div>
    </div>
</div>

<script>
    let player;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('head')[0].appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            videoId: 'IivB75rZ02w',
            playerVars: { 'autoplay': 0, 'controls': 0 }
        });
    }

    function playTick(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function startDraw() {
        const vMin = parseInt(document.getElementById('min').value),
              vMax = parseInt(document.getElementById('max').value),
              n = parseInt(document.getElementById('qty').value),
              card = document.getElementById('mainCard'),
              disp = document.getElementById('display'),
              btn = document.getElementById('btn');

        if (isNaN(vMin) || isNaN(vMax) || vMin >= vMax || n <= 0 || n > (vMax - vMin + 1)) return alert("設定錯誤");

        if (player) { player.setVolume(50); player.playVideo(); }
        btn.disabled = true;
        
        let pool = Array.from({length: vMax - vMin + 1}, (_, i) => i + vMin);
        const winners = pool.sort(() => Math.random() - 0.5).slice(0, n).sort((a,b)=>a-b);

        let count = 0;
        let speed = 50;
        
        function roll() {
            count++;
            // 滾動中的數字保持一般白色發光，避免視覺太亂
            disp.innerHTML = `<span style="font-size: 70px; text-shadow: 0 0 15px rgba(255,255,255,0.5);">${Math.floor(Math.random() * (vMax - vMin + 1)) + vMin}</span>`;
            playTick(400 + count * 15, 'square', 0.05); 
            
            if (count > 25) card.style.animation = "shake 0.1s infinite";

            if (count < 50) {
                setTimeout(roll, speed);
                if (count > 35) speed += 20;
            } else {
                card.style.animation = "none";
                
                // 這裡：中獎號碼完全同步 lucky-text 的 CSS 類別
                disp.innerHTML = `
                    <div class="win-text">恭喜中獎！</div>
                    <div class="win-numbers lucky-text">${winners.join('、')}</div>
                `;
                
                playTick(150, 'sawtooth', 0.5);
                btn.disabled = false;
                setTimeout(() => { if (player) player.setVolume(20); }, 5000);
            }
        }
        roll();
    }
</script>

</body>
</html>
